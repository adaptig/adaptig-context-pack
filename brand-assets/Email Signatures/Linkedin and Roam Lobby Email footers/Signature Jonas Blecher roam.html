<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Signature</title>
</head>
<body style="margin: 0; font-family: 'Poppins', Arial, sans-serif;">
  <table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; font-family: 'Poppins', Arial, sans-serif;">

            <td style="font-size: 14px; font-weight: 600; color: #000000; padding-bottom: 5px;">

          <!-- Title -->

            <td style="font-size: 12px; color: #666666; padding-bottom: 10px;">
              Founding Trainer and Advisor

          </tr>

          <!-- Email -->
          <tr>
            <td style="padding-bottom: 5px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align: middle; padding-right: 8px;">

                  </td>
                  <td style="font-size: 12px;">
                    <a href="mailto:jonas@adaptig.com"
                       style="color: #000000; text-decoration: none;">
                       jonas@adaptig.com
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Phone + LinkedIn -->
          <tr>
            <td style="padding-bottom: 5px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align: middle; padding-right: 8px;">
                    <img src="https://lh7-rt.googleusercontent.com/docsz/AD_4nXdASmHLS0-RgMZ9MNCZZCrbyvNbmnleGCh5UMT_5iLFQ3uR-NK1YCEkEd4k0TrbxAJS_hHGHhCuSswMZiANjh9xEwOm4B6Z0YXW-TocAoDTxcoK4N87mLfDV4xkcOJYrcO-c6Ep?key=wLuNSw7lIwVJldSNQdQ6GQ"
                         alt="phone" style="width: 16px; height: 16px; display: block;">
                  </td>

                  <td style="font-size: 12px; vertical-align: middle;">
                    <a href="tel:+49 176 12851575"
                       style="color: #000000; text-decoration: none;">
                       +49 176 12851575
                    </a>
                  </td>

                  <td style="vertical-align: middle; padding-left: 14px; line-height: 0;">
                    <a href="https://www.linkedin.com/company/adaptig"
                       target="_blank" style="text-decoration:none;">
                      <img src="https://content.linkedin.com/content/dam/me/business/en-us/amp/xbu/linkedin-revised-brand-guidelines/in-logo/fg/brand-inlogo-download-fg-dsk-v01.png.original.png"
                           alt="LinkedIn" style="width: 16px; height: 16px; display: block;">
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Roam Scheduling -->
          <tr>
            <td>
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align: middle; padding-right: 8px;">
                    <img src="https://ro.am/favicon.ico"
                         alt="Roam" style="width: 12px; height: 12px; display: block;">
                  </td>
                  <td style="font-size: 12px; color: #666666;">
                    <a href="https://ro.am/adaptig-jonas/"
                       target="_blank"
                       style="color: #666666; text-decoration: none;">
                      Book time with me
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
